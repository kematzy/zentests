name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:

env:
    COVERAGE_THRESHOLD: 95

# Use a single job to avoid downloading Go multiple times
# This significantly reduces CI time on Gitea
jobs:
    ci:
        name: CI Pipeline
        runs-on: ubuntu-latest
        container:
            image: golang:1.25-bookworm

        steps:
            - name: Install dependencies
              run: |
                  apt-get update -qq
                  apt-get install -y -qq nodejs sqlite3 libsqlite3-dev

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download dependencies
              run: go mod download

            - name: Verify dependencies
              run: go mod verify

            # Build step
            - name: Build
              run: go build -v ./...

            - name: Check go mod tidy
              run: |
                  go mod tidy
                  if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
                    echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' locally."
                    exit 1
                  fi
                  echo "go.mod and go.sum are tidy!"

            # Lint steps
            - name: Run gofmt
              run: |
                  echo "Checking formatting..."
                  GOFMT_OUTPUT=$(gofmt -l .)
                  if [ -n "$GOFMT_OUTPUT" ]; then
                    echo "The following files need formatting:"
                    echo "$GOFMT_OUTPUT"
                    exit 1
                  fi
                  echo "All files are properly formatted!"

            - name: Run go vet
              run: go vet ./...

            - name: Run goimports
              run: |
                  # Check if goimports is available, if not install it
                  if ! command -v goimports &> /dev/null; then
                    go install golang.org/x/tools/cmd/goimports@latest
                  fi
                  echo "Checking imports..."
                  GOIMPORTS_OUTPUT=$(goimports -l .)
                  if [ -n "$GOIMPORTS_OUTPUT" ]; then
                    echo "The following files need import formatting:"
                    echo "$GOIMPORTS_OUTPUT"
                    exit 1
                  fi
                  echo "All imports are properly formatted!"

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v7
              with:
                  version: v2.7.2
                  args: --timeout=5m

            # Test steps
            - name: Run tests with race detector
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Generate coverage report
              run: go tool cover -html=coverage.out -o coverage.html

            - name: Check coverage threshold
              run: |
                  COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
                  echo "Total coverage: $COVERAGE%"
                  if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
                    echo "Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
                    exit 1
                  fi
                  echo "✓ Coverage check passed!"

            # Archive coverage reports (Gitea-compatible)
            # Instead of using upload-artifact@v4 which doesn't work on Gitea,
            # we create a tarball and save it as a generic artifact
            - name: Archive coverage reports
              run: |
                  mkdir -p artifacts
                  cp coverage.html coverage.out artifacts/
                  tar -czf coverage-report.tar.gz -C artifacts .
                  echo "Coverage reports archived"

            - name: Upload coverage artifact (Gitea compatible)
              uses: actions/upload-artifact@v3
              with:
                  name: coverage-report
                  path: coverage-report.tar.gz
                  retention-days: 30
              # Note: If even v3 doesn't work on your Gitea, you can remove this step
              # and the coverage files will still be available in the job logs

            # Alternative: Just display coverage summary in logs
            - name: Display coverage summary
              run: |
                  echo "========================================"
                  echo "Coverage Report Summary"
                  echo "========================================"
                  go tool cover -func=coverage.out | grep total
                  echo "========================================"
                  echo "Full HTML report available in artifacts"
                  echo "========================================"
