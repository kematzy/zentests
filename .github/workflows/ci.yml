name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:

env:
    GO_VERSION_1: "1.24"
    GO_VERSION_2: "1.25"
    COVERAGE_THRESHOLD: 95

jobs:
    # Job 1: Run tests on multiple Go versions
    test:
        name: Test (Go ${{ matrix.go-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                go-version: ["1.24", "1.25"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go ${{ matrix.go-version }}
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go-version }}
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Verify dependencies
              run: go mod verify

            - name: Run tests with race detector
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Generate coverage report
              run: go tool cover -html=coverage.out -o coverage.html

            - name: Check coverage threshold
              run: |
                  COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
                  echo "Total coverage: $COVERAGE%"
                  if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
                    echo "Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
                    exit 1
                  fi
                  echo "Coverage check passed!"

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report-go${{ matrix.go-version }}
                  path: |
                      coverage.html
                      coverage.out
                  retention-days: 30

    # Job 2: Lint and code quality checks
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Run gofmt
              run: |
                  echo "Checking formatting..."
                  GOFMT_OUTPUT=$(gofmt -l .)
                  if [ -n "$GOFMT_OUTPUT" ]; then
                    echo "The following files need formatting:"
                    echo "$GOFMT_OUTPUT"
                    exit 1
                  fi
                  echo "All files are properly formatted!"

            - name: Run go vet
              run: go vet ./...

            - name: Run goimports
              run: |
                  # Check if goimports is available, if not install it
                  if ! command -v goimports &> /dev/null; then
                    go install golang.org/x/tools/cmd/goimports@latest
                  fi
                  echo "Checking imports..."
                  GOIMPORTS_OUTPUT=$(goimports -l .)
                  if [ -n "$GOIMPORTS_OUTPUT" ]; then
                    echo "The following files need import formatting:"
                    echo "$GOIMPORTS_OUTPUT"
                    exit 1
                  fi
                  echo "All imports are properly formatted!"

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest
                  args: --timeout=5m

    # Job 3: Build check
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Build
              run: go build -v ./...

            - name: Check go mod tidy
              run: |
                  go mod tidy
                  if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
                    echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' locally."
                    exit 1
                  fi
                  echo "go.mod and go.sum are tidy!"
